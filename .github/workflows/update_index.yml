name: Update Index

on:
  push:
    branches-ignore:
      - 'gh-pages' # Ignore documentation/pages branches if they exist

jobs:
  update-index:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required for pushing back to the branch

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Full history is safer for auto-commits

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Using a modern stable version

      - name: Install Dependencies
        run: npm install # Ensuring all required dependencies for indexer is present

      - name: Run Indexer
        run: npm run index

      - name: Commit and Push Changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update index files [skip ci]"
          file_pattern: 'index.json index_hash.txt'
